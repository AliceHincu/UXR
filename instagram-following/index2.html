<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Following - nateyballgame</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg2:#121212;--bg3:#262626;--text:#fff;--text2:#a8a8a8;--blue:#0095f6;--red:#ed4956;--border:#363636}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.skip-link{position:absolute;top:-40px;left:0;background:var(--blue);color:#fff;padding:8px 16px;z-index:100;text-decoration:none}
.skip-link:focus{top:10px;left:10px}
.container{max-width:480px;margin:0 auto}
.header-container{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.back-btn,.add-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center}
.back-btn{margin-right:16px}
.back-btn:focus,.add-btn:focus{outline:2px solid var(--blue);outline-offset:2px}
.title{flex:1;text-align:center;font-size:16px;font-weight:600}
.tabs-wrapper{display:block}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:16px;text-align:center;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;position:relative}
.tab[aria-selected="true"]{color:var(--text);font-weight:600}
.tab[aria-selected="true"]::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--text)}
.tab:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
.search-box{padding:12px 16px}
.search-input{width:100%;padding:10px 16px;background:var(--bg3);border:none;border-radius:10px;color:var(--text);font-size:16px}
.search-input::placeholder{color:var(--text2)}
.search-input:focus{outline:2px solid var(--blue)}
.sync{display:flex;align-items:center;padding:12px 16px;gap:12px}
.sync-icon{width:44px;height:44px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center}
.sync-info{flex:1}
.sync-title{font-weight:600;font-size:14px;display:block}
.sync-sub{color:var(--text2);font-size:14px;display:block}
.sync-btn{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.sync-btn:focus{outline:2px solid #fff;outline-offset:2px}
.dismiss{background:none;border:none;color:var(--text2);cursor:pointer;padding:8px;font-size:18px}
.dismiss:focus{outline:2px solid var(--blue)}
.cats{padding:16px}
.cats-title{font-size:16px;font-weight:600;margin-bottom:16px;display:block}
.cat-item{display:flex;align-items:center;padding:12px 0;gap:12px;text-decoration:none;color:inherit;border-radius:8px;background:none;border:none;width:100%;cursor:pointer;text-align:left}
.cat-item:focus{outline:2px solid var(--blue)}
.cat-avatar{width:56px;height:56px;border-radius:50%;background:var(--bg3)}
.cat-info h3{font-size:14px;font-weight:600}
.cat-info p{font-size:14px;color:var(--text2)}
.sort{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
.sort-label{font-size:14px}
.sort-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;display:flex}
.sort-btn:focus{outline:2px solid var(--blue)}
.list{list-style:none}
.item{display:flex;align-items:center;padding:8px 16px;gap:12px}
.item:hover{background:var(--bg2)}
.avatar-btn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0}
.avatar-btn:focus{outline:2px solid var(--blue);border-radius:50%}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--bg3)}
.info{min-width:0;flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.uname-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:0;font-size:14px;font-weight:600;text-align:left;display:flex;align-items:center;gap:4px}
.uname-btn:focus{outline:2px solid var(--blue)}
.dname-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:0;font-size:14px;text-align:left}
.dname-btn:focus{outline:2px solid var(--blue)}
.new{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:4px}
.new:focus{outline:2px solid var(--blue)}
.dot{width:6px;height:6px;background:var(--blue);border-radius:50%}
.actions{display:flex;gap:8px;align-items:center}
.msg-btn{background:var(--bg3);color:var(--text);border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.msg-btn:focus{outline:2px solid var(--blue)}
.more-wrap{position:relative}
.more-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:4px;display:flex}
.more-btn:focus{outline:2px solid var(--blue)}
.dropdown{position:absolute;right:0;top:100%;background:var(--bg3);border-radius:12px;min-width:200px;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:20;display:none;overflow:hidden}
.dropdown.active{display:block}
.drop-item{display:flex;align-items:center;gap:12px;padding:16px;background:none;border:none;color:var(--text);width:100%;text-align:left;cursor:pointer;font-size:14px}
.drop-item:hover,.drop-item:focus{background:var(--border);outline:none}
.drop-item.danger{color:var(--red)}
.overlay{display:none;position:fixed;inset:0;z-index:15}
.overlay.active{display:block}
.variant-indicator{position:fixed;top:10px;right:10px;background:var(--bg3);padding:8px 12px;border-radius:8px;font-size:12px;color:var(--text2);z-index:100}
.verified{color:var(--blue);flex-shrink:0}
</style>
</head>

<script>
const urlParams = new URLSearchParams(window.location.search);
const variant = parseInt(urlParams.get('variant')) || 1;
document.getElementById('variant-display').textContent = variant;

document.querySelectorAll(".more-btn").forEach(btn => {
    const wrap = btn.closest(".more-wrap");
    const menu = wrap.querySelector(".dropdown");
    const items = menu.querySelectorAll(".drop-item");
    const overlay = document.getElementById("overlay");

    function openMenu() {
        menu.classList.add("active");
        overlay.classList.add("active");
        items[0].focus();
    }

    function closeMenu() {
        menu.classList.remove("active");
        overlay.classList.remove("active");
        btn.focus();
    }

    btn.addEventListener("click", e => {
        e.stopPropagation();
        document.querySelectorAll('.dropdown.active').forEach(m => m.classList.remove("active"));
        menu.classList.contains("active") ? closeMenu() : openMenu();
    });

    menu.addEventListener("keydown", e => {
        const idx = Array.from(items).indexOf(document.activeElement);
        if (e.key === "Escape") closeMenu();
        else if (e.key === "ArrowDown") { e.preventDefault(); items[(idx + 1) % items.length].focus(); }
        else if (e.key === "ArrowUp") { e.preventDefault(); items[(idx - 1 + items.length) % items.length].focus(); }
        else if (e.key === "Tab") closeMenu();
    });

    overlay.addEventListener("click", () => {
        document.querySelectorAll('.dropdown.active').forEach(m => m.classList.remove("active"));
        overlay.classList.remove("active");
    });
});

document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.setAttribute("aria-selected", "false"));
        tab.setAttribute("aria-selected", "true");
    });
    tab.addEventListener("keydown", e => {
        const tabs = Array.from(document.querySelectorAll(".tab"));
        const idx = tabs.indexOf(tab);
        if (e.key === "ArrowRight") { e.preventDefault(); tabs[(idx + 1) % tabs.length].focus(); tabs[(idx + 1) % tabs.length].click(); }
        else if (e.key === "ArrowLeft") { e.preventDefault(); tabs[(idx - 1 + tabs.length) % tabs.length].focus(); tabs[(idx - 1 + tabs.length) % tabs.length].click(); }
    });
});

const live = document.createElement("div");
live.setAttribute("aria-live", "polite");
live.classList.add("sr-only");
document.body.appendChild(live);

document.querySelectorAll(".drop-item").forEach(item => {
    item.addEventListener("click", () => {
        const action = item.textContent.trim();
        const userBtn = item.closest(".item").querySelector(".uname-btn");
        const user = userBtn.textContent.trim().split(" ")[0];
        live.textContent = action + " for " + user;
    });
});
</script>
