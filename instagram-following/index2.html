<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Following - nateyballgame</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg2:#121212;--bg3:#262626;--text:#fff;--text2:#a8a8a8;--blue:#0095f6;--red:#ed4956;--border:#363636}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.container{max-width:480px;margin:0 auto}
.header-container{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.back-btn,.add-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center}
.back-btn{margin-right:16px}
.back-btn:focus,.add-btn:focus{outline:2px solid var(--blue);outline-offset:2px}
.title{flex:1;text-align:center;font-size:16px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:16px;text-align:center;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;position:relative}
.tab[aria-selected="true"]{color:var(--text);font-weight:600}
.tab[aria-selected="true"]::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--text)}
.tab:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
.search-box{padding:12px 16px}
.search-input{width:100%;padding:10px 16px;background:var(--bg3);border:none;border-radius:10px;color:var(--text);font-size:16px}
.search-input::placeholder{color:var(--text2)}
.search-input:focus{outline:2px solid var(--blue)}
.cats{padding:16px}
.cats-title{font-size:16px;font-weight:600;margin-bottom:16px;display:block}
.cat-item{display:flex;align-items:center;padding:12px 0;gap:12px;text-decoration:none;color:inherit;border-radius:8px;background:none;border:none;width:100%;cursor:pointer;text-align:left}
.cat-item:focus{outline:2px solid var(--blue)}
.cat-avatar{width:56px;height:56px;border-radius:50%;background:var(--bg3)}
.cat-info h3{font-size:14px;font-weight:600}
.cat-info p{font-size:14px;color:var(--text2)}
.sort{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
.sort-label{font-size:14px}
.sort-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;display:flex}
.sort-btn:focus{outline:2px solid var(--blue)}
.list{list-style:none}
.item{display:flex;align-items:center;padding:8px 16px;gap:12px}
.avatar-btn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0}
.avatar-btn:focus{outline:2px solid var(--blue);border-radius:50%}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--bg3)}
.info{min-width:0;flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.uname-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:0;font-size:14px;font-weight:600;text-align:left;display:flex;align-items:center;gap:4px}
.uname-btn:focus{outline:2px solid var(--blue)}
.dname-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:0;font-size:14px;text-align:left}
.dname-btn:focus{outline:2px solid var(--blue)}
.new{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;background:var(--blue);border-radius:50%}
.actions{display:flex;gap:8px;align-items:center}
.msg-btn{background:var(--bg3);color:var(--text);border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.msg-btn:focus{outline:2px solid var(--blue)}
.more-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:4px;display:flex}
.more-btn:focus{outline:2px solid var(--blue)}
.verified{color:var(--blue);flex-shrink:0}

/* Bottom Sheet Styles */
.bottom-sheet-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:50;
    opacity:0;
    visibility:hidden;
    transition:opacity .2s ease,visibility .2s ease
}
.bottom-sheet-overlay.active{opacity:1;visibility:visible}

.bottom-sheet{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:var(--bg3);
    border-radius:16px 16px 0 0;
    z-index:51;
    transform:translateY(100%);
    transition:transform .3s ease;
    max-height:80vh;
    overflow:hidden
}
.bottom-sheet.active{transform:translateY(0)}

.bottom-sheet-handle{
    width:100%;
    padding:12px;
    display:flex;
    justify-content:center;
    background:none;
    border:none;
    cursor:pointer
}
.bottom-sheet-handle:focus{outline:2px solid var(--blue);outline-offset:-2px}
.bottom-sheet-handle::before{
    content:"";
    width:36px;
    height:4px;
    background:var(--text2);
    border-radius:2px
}

.bottom-sheet-header{
    padding:0 16px 12px;
    border-bottom:1px solid var(--border);
    text-align:center
}
.bottom-sheet-title{font-size:14px;font-weight:600}

.bottom-sheet-actions{padding:8px 0}
.sheet-item{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 20px;
    background:none;
    border:none;
    color:var(--text);
    width:100%;
    text-align:left;
    cursor:pointer;
    font-size:16px
}
.sheet-item:focus{background:var(--border);outline:none}
.sheet-item.danger{color:var(--red)}
.sheet-item svg{flex-shrink:0}

.bottom-sheet-cancel{
    padding:8px 16px 24px;
    border-top:1px solid var(--border)
}
.cancel-btn{
    width:100%;
    padding:14px;
    background:var(--bg2);
    border:none;
    border-radius:12px;
    color:var(--text);
    font-size:16px;
    font-weight:600;
    cursor:pointer
}
.cancel-btn:focus{outline:2px solid var(--blue);outline-offset:2px}
</style>
</head>

<!-- Bottom Sheet Overlay -->

<!-- Bottom Sheet -->
<div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-label="User options" aria-hidden="true">

    </button>

    </div>

            <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>

            <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            See shared activity

            <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            Mute

    </div>
</div>

<!-- Live region for announcements -->
<div aria-live="polite" class="sr-only" id="live-region"></div>

<script>
const mainContent = document.getElementById('main-content');
const overlay = document.getElementById('sheet-overlay');
const sheet = document.getElementById('bottom-sheet');
const sheetTitle = document.getElementById('sheet-title');
const sheetHandle = document.getElementById('sheet-handle');
const sheetCancel = document.getElementById('sheet-cancel');
const liveRegion = document.getElementById('live-region');
const sheetItems = sheet.querySelectorAll('.sheet-item');
const firstFocusable = sheetHandle;
const lastFocusable = sheetCancel;

let currentUsername = '';
let triggerButton = null;

function openSheet(username, button) {
    currentUsername = username;
    triggerButton = button;
    sheetTitle.textContent = username;
    sheet.setAttribute('aria-label', `Options for ${username}`);
    
    // Hide main content from assistive tech
    mainContent.setAttribute('inert', '');
    mainContent.setAttribute('aria-hidden', 'true');
    
    // Show sheet
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
    sheet.classList.add('active');
    sheet.setAttribute('aria-hidden', 'false');
    
    // Focus first action after animation
    setTimeout(() => {
        sheetItems[0].focus();
    }, 100);
}

function closeSheet(returnFocus = true) {
    // Hide sheet
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
    sheet.classList.remove('active');
    sheet.setAttribute('aria-hidden', 'true');
    
    // Restore main content
    mainContent.removeAttribute('inert');
    mainContent.removeAttribute('aria-hidden');
    
    // Return focus to trigger button
    if (returnFocus && triggerButton) {
        triggerButton.focus();
    }
    
    currentUsername = '';
    triggerButton = null;
}

// Open sheet when more button clicked
document.querySelectorAll('.more-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const username = btn.getAttribute('data-username');
        openSheet(username, btn);
    });
});

// Close handlers
overlay.addEventListener('click', () => closeSheet());
sheetHandle.addEventListener('click', () => closeSheet());
sheetCancel.addEventListener('click', () => closeSheet());

// Action handlers
sheetItems.forEach(item => {
    item.addEventListener('click', () => {
        const action = item.getAttribute('data-action');
        const actionText = item.textContent.trim();
        
        // Announce action
        liveRegion.textContent = `${actionText} ${currentUsername}`;
        
        closeSheet();
    });
});

// Keyboard handling
sheet.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        e.preventDefault();
        closeSheet();
    }
    
    // Trap focus within sheet
    if (e.key === 'Tab') {
        if (e.shiftKey && document.activeElement === firstFocusable) {
            e.preventDefault();
            lastFocusable.focus();
        } else if (!e.shiftKey && document.activeElement === lastFocusable) {
            e.preventDefault();
            firstFocusable.focus();
        }
    }
});

// Tab navigation
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.setAttribute('aria-selected', 'false'));
        tab.setAttribute('aria-selected', 'true');
    });
    
    tab.addEventListener('keydown', e => {
        const tabs = Array.from(document.querySelectorAll('.tab'));
        const idx = tabs.indexOf(tab);
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            tabs[(idx + 1) % tabs.length].focus();
            tabs[(idx + 1) % tabs.length].click();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            tabs[(idx - 1 + tabs.length) % tabs.length].focus();
            tabs[(idx - 1 + tabs.length) % tabs.length].click();
        }
    });
});
</script>
</body>
</html>
