<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Editor - Accessible</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #121212; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .phone { width: 375px; height: 812px; background: #000; border-radius: 40px; overflow: hidden; border: 3px solid #333; position: relative; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .screen.hidden { display: none; }
        
        .editor { height: 100%; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 16px; position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
        
        .btn { 
            background: rgba(80, 80, 80, 0.7); 
            border: none; 
            color: #fff; 
            cursor: pointer; 
            padding: 12px; 
            border-radius: 50%; 
            font-size: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { background: rgba(50, 50, 50, 0.9); }
        .btn:focus { outline: 3px solid #4dabf7; outline-offset: 2px; }
        
        .preview { flex: 1; position: relative; }
        .preview-image { width: 100%; height: 100%; object-fit: cover; }
        
        .tools { 
            display: flex; 
            gap: 8px; 
            padding: 12px 16px; 
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            z-index: 10;
            background: transparent;
        }
        .tool { 
            background: rgba(80, 80, 80, 0.7); 
            border: none; 
            color: #fff; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool:hover { background: rgba(50, 50, 50, 0.9); }
        .tool:focus { outline: 3px solid #4dabf7; outline-offset: 2px; }
        
        .actions { 
            display: flex; 
            justify-content: space-between; 
            padding: 16px; 
            background: #000; 
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        .act { padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; }
        .act:focus { outline: 3px solid #4dabf7; outline-offset: 2px; }
        .edit-btn { background: rgba(255,255,255,0.15); color: #fff; }
        .edit-btn:hover { background: rgba(255,255,255,0.25); }
        .next-btn { background: #fff; color: #000; }
        .next-btn:hover { background: #e0e0e0; }
        
        .picker { height: 100%; display: flex; flex-direction: column; background: #000; }
        .search-header { display: flex; padding: 16px; padding-top: 50px; gap: 12px; align-items: center; border-bottom: 1px solid #333; }
        .search-box { flex: 1; }
        .search { width: 100%; padding: 10px 16px; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; }
        .search:focus { outline: 3px solid #4dabf7; }
        .grid { flex: 1; overflow-y: auto; padding: 16px; }
        .grid-inner { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sticker { aspect-ratio: 1; background: transparent; border: 2px solid transparent; border-radius: 12px; cursor: pointer; font-size: 32px; }
        .sticker:hover, .sticker:focus { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .sticker:focus { outline: 3px solid #4dabf7; outline-offset: 2px; }
        
        .skip-link { position: absolute; top: -50px; left: 0; background: #4dabf7; color: #000; padding: 8px 16px; z-index: 100; text-decoration: none; }
        .skip-link:focus { top: 0; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>
    <div id="announcer" class="sr-only" aria-live="polite"></div>
    
    <main id="main">
        <div class="phone">
            
            <!-- SCREEN 1: Video Editor -->
            <div id="screen-editor" class="screen editor">
                <section class="preview" aria-label="Video preview showing a dog">
                    <img class="preview-image" src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=400&h=700&fit=crop" alt="A happy golden retriever dog">
                </section>
                
                <header class="header">
                    <button class="btn" aria-label="Go back">&lt;</button>
                    <button class="btn" aria-label="More options">⋮</button>
                </header>
                
                <nav class="tools" aria-label="Editing tools">
                    <button class="tool" aria-label="Add text">Aa</button>
                    <button id="add-stickers-btn" class="tool" aria-label="Add stickers">😊</button>
                    <button class="tool" aria-label="Add music">🎵</button>
                    <button class="tool" aria-label="Add effects">✨</button>
                    <button class="tool" aria-label="Draw">✏️</button>
                    <button class="tool" aria-label="Volume">🔊</button>
                </nav>
                
                <footer class="actions">
                    <button class="act edit-btn">Edit video</button>
                    <button class="act next-btn">Next &gt;</button>
                </footer>
            </div>
            
            <!-- SCREEN 4: Heart Stickers -->
            <div id="screen-stickers" class="screen picker hidden">
                <header class="search-header">
                    <button id="back-btn" class="btn" aria-label="Go back to editor">&lt;</button>
                    <div class="search-box">
                        <label id="search-label" for="search" class="sr-only">Search</label>
                        <input type="search" id="search" class="search" placeholder="Search" aria-labelledby="search-label">
                    </div>
                </header>
                <section class="grid" aria-label="Heart stickers">
                    <h2 class="sr-only">24 heart stickers available</h2>
                    <div class="grid-inner">
                        <button class="sticker" aria-label="Purple heart">💜</button>
                        <button class="sticker" aria-label="Pink heart">💗</button>
                        <button class="sticker" aria-label="Brown heart">🤎</button>
                        <button class="sticker" aria-label="Orange heart">🧡</button>
                        <button class="sticker" aria-label="Black heart">🖤</button>
                        <button class="sticker" aria-label="Red heart">❤️</button>
                        <button class="sticker" aria-label="Two hearts">💕</button>
                        <button class="sticker" aria-label="Revolving hearts">💞</button>
                        <button class="sticker" aria-label="Green heart">💚</button>
                        <button class="sticker" aria-label="Yellow heart">💛</button>
                        <button class="sticker" aria-label="Blue heart">💙</button>
                        <button class="sticker" aria-label="Heart with arrow">💘</button>
                        <button class="sticker" aria-label="Sparkling heart">💖</button>
                        <button class="sticker" aria-label="Heart eyes">😍</button>
                        <button class="sticker" aria-label="Heart exclamation">❣️</button>
                        <button class="sticker" aria-label="Face with hearts">🥰</button>
                        <button class="sticker" aria-label="Gift heart">💝</button>
                        <button class="sticker" aria-label="Beating heart">💓</button>
                        <button class="sticker" aria-label="Broken heart">💔</button>
                        <button class="sticker" aria-label="Heart decoration">💟</button>
                        <button class="sticker" aria-label="Hundred points">💯</button>
                        <button class="sticker" aria-label="White heart">🤍</button>
                        <button class="sticker" aria-label="Mending heart">❤️‍🩹</button>
                        <button class="sticker" aria-label="Heart on fire">❤️‍🔥</button>
                    </div>
                </section>
            </div>
            
        </div>
    </main>
    
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var variant = urlParams.get('variant');
        
        var labelVariants = {
            '1': 'Search',
            '2': 'Search for stickers'
        };
        
        if (!variant || !labelVariants[variant]) {
            variant = '1';
        }
        
        var labelText = labelVariants[variant];
        
        var searchLabel = document.getElementById('search-label');
        var searchInput = document.getElementById('search');
        
        searchLabel.textContent = labelText;
        searchInput.setAttribute('placeholder', labelText);
        searchInput.setAttribute('aria-label', labelText);
        
        var screenEditor = document.getElementById('screen-editor');
        var screenStickers = document.getElementById('screen-stickers');
        var addStickersBtn = document.getElementById('add-stickers-btn');
        var backBtn = document.getElementById('back-btn');
        var announcer = document.getElementById('announcer');
        
        addStickersBtn.addEventListener('click', function() {
            screenEditor.classList.add('hidden');
            screenStickers.classList.remove('hidden');
            announcer.textContent = 'Stickers screen opened';
            searchInput.focus();
        });
        
        backBtn.addEventListener('click', function() {
            screenStickers.classList.add('hidden');
            screenEditor.classList.remove('hidden');
            announcer.textContent = 'Returned to editor';
            addStickersBtn.focus();
        });
        
        document.querySelectorAll('.sticker').forEach(function(btn) {
            btn.addEventListener('click', function() {
                announcer.textContent = this.getAttribute('aria-label') + ' selected';
            });
        });
    </script>
</body>
</html>
