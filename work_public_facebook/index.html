<div id="variantIndicator" class="variant-indicator"></div>

<script>
// Get variant from URL parameter
function getVariant() {
  const params = new URLSearchParams(window.location.search);
  const variant = parseInt(params.get('variant')) || 1;
  return Math.min(Math.max(variant, 1), 3); // Clamp between 1-3
}

// Set aria-label based on variant
function setPublicBadgeLabel() {
  const variant = getVariant();
  const publicBadge = document.getElementById('publicBadge');
  const variantIndicator = document.getElementById('variantIndicator');
  
  const labels = {
    1: 'Public',
    2: 'Public, work experience',
    3: 'Public, who can see, work experience'
  };
  
  publicBadge.setAttribute('aria-label', labels[variant]);
  variantIndicator.textContent = 'Variant ' + variant + ': "' + labels[variant] + '"';
}

// Initialize on page load
setPublicBadgeLabel();

function showEditMode() {
  const viewMode = document.getElementById('viewMode');
  const editForm = document.getElementById('editForm');
  viewMode.classList.add('hidden');
  editForm.classList.add('active');
  document.getElementById('publicBadge').focus();
  announceToScreenReader('Edit form opened. You can now edit your work experience at Meta.');
}

function hideEditMode() {
  const viewMode = document.getElementById('viewMode');
  const editForm = document.getElementById('editForm');
  viewMode.classList.remove('hidden');
  editForm.classList.remove('active');
  document.querySelector('.work-btn[aria-label="Edit work experience at Meta"]').focus();
  announceToScreenReader('Edit form closed.');
}

function announceToScreenReader(message) {
  const announcement = document.createElement('div');
  announcement.setAttribute('role', 'status');
  announcement.setAttribute('aria-live', 'polite');
  announcement.setAttribute('aria-atomic', 'true');
  announcement.className = 'sr-only';
  announcement.textContent = message;
  document.body.appendChild(announcement);
  setTimeout(() => announcement.remove(), 1000);
}

const formInputs = document.querySelectorAll('#editForm input, #editForm textarea, #editForm select');
formInputs.forEach(el => {
  el.addEventListener('input', enableSaveButton);
  el.addEventListener('change', enableSaveButton);
});

function enableSaveButton() {
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.classList.add('active');
  saveBtn.disabled = false;
  saveBtn.setAttribute('aria-disabled', 'false');
}

document.getElementById('editForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const saveBtn = document.getElementById('saveBtn');
  if (!saveBtn.disabled) {
    hideEditMode();
    announceToScreenReader('Work experience saved successfully.');
  }
});

document.querySelectorAll('.menu-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.menu-btn').forEach(b => {
      b.setAttribute('aria-selected', 'false');
      b.removeAttribute('aria-current');
    });
    this.setAttribute('aria-selected', 'true');
    this.setAttribute('aria-current', 'true');
  });
});
</script>
